name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Fetch mainui
      run: git clone https://github.com/Aynekko/Diffusion-MainUI 3rd-party/mainui_cpp
    - name: Build for Linux
      run: |
        ./waf configure -T release install --destdir=diffusion
        zip -r diffusion-linux-amd64.zip diffusion
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diffusion-linux-amd64
        path: diffusion-linux-amd64.zip
  release:
    name: "Upload to releases"
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Remove old release, fetch artifacts, repackage binaries and upload new release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        bash scripts/gha/make_release.sh "Diffusion" "${{ github.ref_name }}"
